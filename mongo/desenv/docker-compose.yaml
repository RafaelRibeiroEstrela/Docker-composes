version: "3.8"

services:
  mongo1:
    image: mongodb/mongodb-community-server:latest
    container_name: mongo1
    hostname: mongo1
    restart: unless-stopped
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - mongo-net

  mongo2:
    image: mongodb/mongodb-community-server:latest
    container_name: mongo2
    hostname: mongo2
    restart: unless-stopped
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    networks:
      - mongo-net

  mongo3:
    image: mongodb/mongodb-community-server:latest
    container_name: mongo3
    hostname: mongo3
    restart: unless-stopped
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    networks:
      - mongo-net

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:

networks:
  mongo-net:
    driver: bridge