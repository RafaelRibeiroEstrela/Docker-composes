version: '3.8'

services:
  kafka-zookeeper:
    container_name: kafka-zookeeper-container
    image: confluentinc/cp-zookeeper:latest
    networks: 
      - rede1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    container_name: kafka-container
    image: confluentinc/cp-kafka:latest
    networks: 
      - rede1
    depends_on:
      - kafka-zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: server-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://streaming-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafdrop:
    container_name: kafdrop-container
    image: obsidiandynamics/kafdrop:latest
    ports:
      - 19000:9000
    depends_on:
      - kafka 
    networks: 
      - rede1
    environment:
      KAFKA_BROKERCONNECT: kafka:29092

networks: 
  rede1:
    external: true  
